name: sports_field_booking_app
description: "Sports Field Booking Application"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

  # Image Picker (Camera)
  image_picker: ^1.1.2

  # Local Notifications
  flutter_local_notifications: ^17.2.3

  permission_handler: ^11.3.1

  # UI & Utility
  intl: ^0.19.0
  cached_network_image: ^3.4.1
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true